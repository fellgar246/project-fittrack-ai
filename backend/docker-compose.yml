services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fittrack
      POSTGRES_PASSWORD: fittrack
      POSTGRES_DB: fittrack
    ports:
      - "5433:5432"
    volumes:
      - fittrack_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fittrack -d fittrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://fittrack:fittrack@db:5432/fittrack
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  fittrack_db_data:

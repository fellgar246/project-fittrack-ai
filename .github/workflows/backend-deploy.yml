name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional immutable tag override (rollback). Must exist in ACR.'
        required: false
        type: string
      run_progress_photos_smoke:
        description: 'Run progress photos cloud smoke script'
        required: false
        type: boolean
        default: false
      run_ai_smoke:
        description: 'Run weekly AI recommendation cloud smoke (Azure OpenAI cost)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: fittrack-development-deployment
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TERRAFORM_VERSION: 1.10.5
  TERRAFORM_ENV: infra/terraform/azure/environments/dev

jobs:
  deployment-preflight:
    name: Deployment preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Reject non-main branches
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Deployment is allowed only from main."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        working-directory: infra/terraform/azure
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TERRAFORM_ENV }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_ENV }}
        run: terraform validate -no-color

      - name: Resolve immutable image tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG}" ]]; then
            if [[ ! "${INPUT_TAG}" =~ ^(sha-[0-9a-f]{7,40}|block-[0-9]+(\.[0-9]+)*[-a-z0-9.]*)$ ]]; then
              echo "Invalid image_tag format: ${INPUT_TAG}"
              exit 1
            fi
            echo "image_tag=${INPUT_TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "image_tag=sha-${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"
          fi

  deployment-apply:
    name: Development deployment
    needs: deployment-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main'
    environment: development

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_ENV }}

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      IMAGE_TAG: ${{ needs.deployment-preflight.outputs.image_tag }}
      TF_PLAN_FILE: ${{ runner.temp }}/deploy.tfplan
      TF_PLAN_JSON: ${{ runner.temp }}/deploy-plan.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure subscription
        shell: bash
        run: |
          set -euo pipefail
          actual="$(az account show --query id -o tsv)"
          expected="${{ vars.AZURE_SUBSCRIPTION_ID }}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "Unexpected subscription: ${actual} (expected ${expected})"
            exit 1
          fi
          echo "Subscription verified."

      - name: Verify image tag in ACR
        shell: bash
        run: |
          set -euo pipefail
          if az acr repository show-tags \
            --name "${{ vars.AZURE_ACR_NAME }}" \
            --repository fittrack-api \
            --query "contains(@, '${IMAGE_TAG}')" -o tsv | grep -qx true; then
            echo "Image tag ${IMAGE_TAG} already exists in ACR — skipping build."
            echo "skip_build=true" >> "${GITHUB_ENV}"
          else
            echo "Image tag ${IMAGE_TAG} not found — will build and push."
            echo "skip_build=false" >> "${GITHUB_ENV}"
          fi

      - name: Build and push image to ACR
        if: env.skip_build == 'false'
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "fittrack-api:${IMAGE_TAG}" \
            --platform linux/amd64 \
            --file backend/Dockerfile \
            backend

      - name: Record image digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          digest="$(az acr repository show \
            --name "${{ vars.AZURE_ACR_NAME }}" \
            --image "fittrack-api:${IMAGE_TAG}" \
            --query digest -o tsv)"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Image digest: ${digest}"

      - name: Terraform init (remote backend)
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.TF_BACKEND_STATE_KEY }}"

      - name: Terraform plan (deployment)
        id: plan
        shell: bash
        env:
          TF_VAR_owner: ${{ vars.TF_VAR_owner }}
          TF_VAR_unique_suffix: ${{ vars.TF_VAR_unique_suffix }}
          TF_VAR_api_ai_provider: ${{ vars.TF_VAR_api_ai_provider }}
          TF_VAR_api_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_api_azure_openai_endpoint: ${{ secrets.TF_VAR_api_azure_openai_endpoint }}
          TF_VAR_api_azure_openai_api_key: ${{ secrets.TF_VAR_api_azure_openai_api_key }}
          TF_VAR_api_azure_openai_deployment: ${{ secrets.TF_VAR_api_azure_openai_deployment }}
          TF_VAR_api_azure_openai_api_version: ${{ vars.TF_VAR_api_azure_openai_api_version }}
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var-file="terraform.azure-openai.example.tfvars" \
            -var-file="terraform.blob-storage.example.tfvars" \
            -out="${TF_PLAN_FILE}"
          exit_code=$?
          set -e

          if [[ "${exit_code}" -eq 1 ]]; then
            echo "Terraform plan failed."
            exit 1
          fi

          if [[ "${exit_code}" -ne 0 && "${exit_code}" -ne 2 ]]; then
            echo "Unexpected terraform plan exit code: ${exit_code}"
            exit "${exit_code}"
          fi

          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Analyze deployment plan safety
        shell: bash
        run: |
          terraform show -json "${TF_PLAN_FILE}" > "${TF_PLAN_JSON}"
          python3 ../../../scripts/check_plan_safety.py "${TF_PLAN_JSON}"

      - name: Terraform apply (saved plan)
        shell: bash
        run: terraform apply -input=false -no-color "${TF_PLAN_FILE}"

      - name: Wait for Container App readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail
          app="${{ vars.AZURE_CONTAINER_APP_NAME }}"
          rg="${{ vars.AZURE_RESOURCE_GROUP }}"
          expected="${{ vars.AZURE_ACR_NAME }}.azurecr.io/fittrack-api:${IMAGE_TAG}"

          for attempt in $(seq 1 24); do
            image="$(az containerapp show -g "${rg}" -n "${app}" \
              --query "properties.template.containers[0].image" -o tsv)"
            revision="$(az containerapp show -g "${rg}" -n "${app}" \
              --query "properties.latestRevisionName" -o tsv)"
            state="$(az containerapp revision list -g "${rg}" -n "${app}" \
              --query "[?name=='${revision}'].properties.runningState | [0]" -o tsv)"

            echo "Attempt ${attempt}: image=${image} revision=${revision} state=${state}"

            if [[ "${image}" == "${expected}" && "${state}" == "Running" ]]; then
              echo "revision=${revision}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 10
          done

          echo "Container App did not become ready with expected image."
          exit 1

      - name: Run Alembic migration
        id: migration
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          server="psql-fittrack-ai-pg-dev01"
          rg="${{ vars.AZURE_RESOURCE_GROUP }}"
          rule="gh-deploy-${GITHUB_RUN_ID}"
          runner_ip="$(curl -fsS https://api.ipify.org)"

          az postgres flexible-server firewall-rule create \
            --resource-group "${rg}" \
            --name "${server}" \
            --rule-name "${rule}" \
            --start-ip-address "${runner_ip}" \
            --end-ip-address "${runner_ip}" \
            --only-show-errors

          cleanup() {
            az postgres flexible-server firewall-rule delete \
              --resource-group "${rg}" \
              --name "${server}" \
              --rule-name "${rule}" \
              --yes \
              --only-show-errors || true
          }
          trap cleanup EXIT

          DATABASE_URL="$(az keyvault secret show \
            --vault-name kvfittrackaidevdev01 \
            --name DATABASE-URL \
            --query value -o tsv)"

          export DATABASE_URL
          uv sync --frozen
          uv run alembic upgrade head
          revision="$(uv run alembic current 2>/dev/null | tail -1 | awk '{print $1}')"
          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

      - name: Health check
        id: health
        shell: bash
        run: |
          set -euo pipefail
          base="${{ vars.API_BASE_URL }}"
          for attempt in $(seq 1 12); do
            code="$(curl -fsS -o /dev/null -w "%{http_code}" "${base}/health" || echo "000")"
            echo "Attempt ${attempt}: HTTP ${code}"
            if [[ "${code}" == "200" ]]; then
              echo "status=200" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed."
          exit 1

      - name: Progress photos smoke
        if: inputs.run_progress_photos_smoke
        shell: bash
        working-directory: backend
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}
        run: bash scripts/smoke_progress_photos_cloud.sh

      - name: Weekly AI smoke
        if: inputs.run_ai_smoke
        shell: bash
        working-directory: backend
        env:
          BASE_URL: ${{ vars.API_BASE_URL }}
        run: bash scripts/smoke_weekly_recommendations_cloud.sh

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## FitTrack AI Development Deployment"
            echo
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- Image: \`${{ vars.AZURE_ACR_NAME }}.azurecr.io/fittrack-api:${IMAGE_TAG}\`"
            echo "- Digest: \`${{ steps.digest.outputs.digest }}\`"
            echo "- Terraform safety: Passed"
            echo "- Apply: Passed"
            echo "- Migration: \`${{ steps.migration.outputs.revision || 'skipped' }}\`"
            echo "- Container App revision: \`${{ steps.readiness.outputs.revision || 'n/a' }}\`"
            echo "- Health: HTTP \`${{ steps.health.outputs.status || 'failed' }}\`"
            echo "- Progress Photos smoke: ${{ inputs.run_progress_photos_smoke && 'Passed' || 'Skipped' }}"
            echo "- Weekly AI smoke: ${{ inputs.run_ai_smoke && 'Passed' || 'Skipped' }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Remove sensitive plan files
        if: always()
        run: rm -f "${TF_PLAN_FILE}" "${TF_PLAN_JSON}"
